name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check app

      # Tests run fully offline: no DB, no Redis, no API keys. The code auto-falls back to
      # deterministic/stub providers when keys are absent (see CLAUDE.md).
      # `python -m pytest` (not bare `pytest`) puts the working dir on sys.path so `app` imports.
      - name: Tests
        run: python -m pytest -q

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No committed lockfile yet (Node isn't available in the dev environment), so use
      # `npm install` rather than `npm ci` and skip the lockfile-keyed cache.
      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # Build with placeholder public env so the compile step succeeds; real values are
      # injected by Vercel at deploy time.
      - name: Build
        run: npm run build
        env:
          # Well-formed dummy key (decodes to clerk.example.com$) so Clerk's build-time
          # format validation passes; real values are injected by Vercel at deploy time.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          API_BASE_URL: http://localhost:8000
